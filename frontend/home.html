<!DOCTYPE html>
<html>
<head>
    <title>Home page</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="site-header">
    <img src="/static/logo.png" alt="Logo" class="logo">
    <h1 class="site-name">Cyber Threatshield</h1>
    <div class="header-actions">
        <div class="logout-btn">
        <a href="/logout"><button type="button">Logout</button></a>
        </div>
    </div>
</div>

<div class="home-container">

    <div class="button-block">
        <h2>Link Scanner</h2>
        <p>Check if a link is safe before visiting it.</p>
        <button disabled>Scan Now</button>
    </div>

    <div class="button-block">
        <h2>Phishing Detection</h2>
        <p>Detect phishing websites quickly before you interact with them.</p>
        <a href="/scanner">
            <button>Scan Now</button>
        </a>
    </div>

    <div class="button-block">
        <h2>Vulnerability Check</h2>
        <p>Scan website links to detect potential security vulnerabilities.</p>
        <a href="/vuln">
            <button>Scan Now</button>
        </a>
    </div>

</div>

</body>
</html>
